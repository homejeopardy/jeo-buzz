<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Buzzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #111; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; padding: 20px; }
        .setup-screen { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; text-align: center; }
        input { padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #555; background: #222; color: white; text-align: center; }
        button.start-btn { background: #27ae60; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        .buzzer-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .buzzer-btn { width: 80vw; height: 80vw; max-width: 300px; max-height: 300px; background: #d9534f; border: 8px solid #962d2a; border-radius: 50%; color: white; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 0 #732220, 0 15px 20px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; }
        .buzzer-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #732220, 0 5px 10px rgba(0,0,0,0.5); background: #c9302c; }
        .buzzer-btn:disabled { background: #555 !important; border-color: #333 !important; box-shadow: none !important; transform: none !important; cursor: not-allowed; }
        .status { margin-top: 30px; font-size: 20px; font-weight: bold; color: #f0ad4e; text-align: center; max-width: 90%; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="setup-screen" id="setup">
        <h2>Enter Team Name</h2>
        <input type="text" id="team-input" placeholder="e.g., Team 1" maxlength="15">
        <button class="start-btn" id="join-btn" onclick="joinGame()">Join Game</button>
    </div>

    <div class="buzzer-screen" id="gameplay">
        <button class="buzzer-btn" id="buzz-button" onclick="pressBuzzer()">BUZZ</button>
        <div class="status" id="status-text">Connecting...</div>
    </div>

<script>
let client;
let teamName = "";
const roomId = "family_jeopardy_2026"; 

// Absolute fallback tracker to find out exactly why a phone crashes
window.onerror = function(msg, url, line) {
    alert("Error: " + msg + "\nLine: " + line);
    return false;
};

function joinGame() {
    const input = document.getElementById('team-input').value.trim();
    if(!input) return alert("Please enter a name!");
    
    // Safety check to ensure library loaded properly on phone connection type
    if (typeof mqtt === 'undefined') {
        return alert("The network driver couldn't load. Make sure your phone is connected to the internet!");
    }

    teamName = input;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('gameplay').style.display = 'flex';
    document.getElementById('status-text').innerText = "Connecting to Game Server...";
    
    try {
        // High-security configuration port link to bypass phone carrier restrictions
        client = mqtt.connect('wss://broker.hivemq.com:8043/mqtt');
        
        client.on('connect', () => {
            document.getElementById('status-text').innerText = "Connected! Waiting for clue...";
            client.subscribe(`${roomId}/system`);
        });

        client.on('error', (err) => {
            document.getElementById('status-text').innerText = "Connection error: " + err.message;
        });

        client.on('message', (topic, message) => {
            const msg = JSON.parse(message.toString());
            const btn = document.getElementById('buzz-button');
            const status = document.getElementById('status-text');

            if(msg.type === "LOCK_BUZZERS") {
                btn.disabled = true;
                status.innerText = msg.reason || "Locked";
            }
            if(msg.type === "UNLOCK_BUZZERS") {
                btn.disabled = false;
                status.innerText = "BUZZER ACTIVE! GO!";
            }
        });
    } catch (e) {
        alert("Connection failure: " + e.message);
    }
}

function pressBuzzer() {
    if (client && client.connected) {
        client.publish(`${roomId}/buzz`, JSON.stringify({ team: teamName }));
    }
}
</script>
</body>
</html>
